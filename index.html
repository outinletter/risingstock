<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>장중 모멘텀 리포트 v1.5.0</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 및 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        @keyframes loading-progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        .animate-loading {
            animation: loading-progress 1.5s infinite linear;
        }
    </style>
</head>
<body class="bg-[#fcfcfd]">
    <div id="root"></div>

    <script type="text/babel">
        const { useMemo, useState, useEffect, useRef } = React;

        const VERSION = "v1.5.0";

        // 날짜 가독성 포맷 헬퍼 함수
        const getFormattedDate = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const date = String(dateObj.getDate()).padStart(2, '0');
            const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const day = dayNames[dateObj.getDay()];
            return `${year}. ${month}. ${date} ${day}`;
        };

        // 모든 문장을 한 줄로 이어지게 처리하는 헬퍼 (줄바꿈 제거)
        const enrichReasonContinuous = (text) => {
            const extra = "외국인·기관 동시 순매수와 거래대금 증가가 이어지고 있으며, 장 초반 급등 이후에도 매수 체결 강도가 안정적으로 유지되고 있습니다. 또한 동일 테마 업종 전반으로 수급이 확산되며 단기 모멘텀이 강화되고 있고, 20일 이동평균선 지지 흐름이 유지되어 눌림목 이후 재상승 가능성이 매우 높은 상태입니다.";
            return `${text} ${extra}`;
        };

        const rawStocksData = {
            '코스피': [
                { id: 1, name: 'SK하이닉스', baseScore: 94, volatility: 3, strength: '외국인 수급 집중 + AI 반도체 대장주', coreReason: 'HBM 메모리 수요 증가와 AI 서버 투자 확대 수혜가 지속되고 있습니다.' },
                { id: 2, name: '삼성전자', baseScore: 91, volatility: 2, strength: 'AI 반도체 투자 확대 수혜', coreReason: '반도체 업황 회복 기대와 외국인 매수세가 강화되고 있습니다.' },
                { id: 3, name: '한미반도체', baseScore: 90, volatility: 4, strength: 'HBM 장비 핵심 공급주', coreReason: 'HBM 생산 확대 핵심 장비 공급 기대가 반영되고 있습니다.' },
                { id: 4, name: 'HD현대일렉트릭', baseScore: 89, volatility: 5, strength: '전력 인프라 성장 수혜', coreReason: 'AI 데이터센터 확대에 따른 전력 장비 수요 증가가 기대됩니다.' },
                { id: 5, name: 'LS ELECTRIC', baseScore: 88, volatility: 4, strength: 'AI 데이터센터 전력 수혜', coreReason: '글로벌 전력 인프라 투자 확대 흐름이 이어지고 있습니다.' },
                { id: 6, name: '현대차', baseScore: 87, volatility: 2, strength: '전기차 성장 수혜', coreReason: '글로벌 친환경차 판매 증가와 실적 개선 기대가 반영되고 있습니다.' },
                { id: 7, name: '기아', baseScore: 86, volatility: 2, strength: '수출 성장 지속', coreReason: 'SUV 및 고수익 차량 판매 비중 확대 흐름이 이어지고 있습니다.' },
                { id: 8, name: '포스코홀딩스', baseScore: 84, volatility: 3, strength: '2차전지 소재 성장', coreReason: '리튬 및 2차전지 소재 사업 확대 기대감이 반영되고 있습니다.' },
                { id: 9, name: 'LG에너지솔루션', baseScore: 84, volatility: 3, strength: '배터리 대장주', coreReason: '글로벌 배터리 공급 확대와 장기 성장 기대가 유지되고 있습니다.' },
                { id: 10, name: 'SK텔레콤', baseScore: 83, volatility: 1, strength: 'AI 데이터센터 성장', coreReason: 'AI 인프라 및 데이터센터 투자 확대 기대가 강화되고 있습니다.' },
            ],
            '코스닥': [
                { id: 11, name: '레인보우로보틱스', baseScore: 92, volatility: 4, strength: '로봇 대장주', coreReason: '삼성 로봇 사업 확대 기대감이 강하게 반영되고 있습니다.' },
                { id: 12, name: '두산로보틱스', baseScore: 91, volatility: 5, strength: 'AI 자동화 핵심주', coreReason: 'AI 기반 자동화 산업 성장과 로봇 수요 증가 기대가 이어지고 있습니다.' },
                { id: 13, name: 'HPSP', baseScore: 90, volatility: 3, strength: '첨단 반도체 장비주', coreReason: '첨단 공정 투자 확대 수혜 기대감이 강화되고 있습니다.' },
                { id: 14, name: '에코프로비엠', baseScore: 89, volatility: 6, strength: '2차전지 반등 기대', coreReason: '전기차 배터리 수요 회복 기대와 거래량 증가가 나타나고 있습니다.' },
                { id: 15, name: '알테오젠', baseScore: 89, volatility: 5, strength: '바이오 기술 수출 기대', coreReason: '글로벌 기술 수출 확대와 임상 기대감이 반영되고 있습니다.' },
                { id: 16, name: '펩트론', baseScore: 87, volatility: 5, strength: '비만 치료제 수혜', coreReason: '장기 지속형 플랫폼 기술 경쟁력이 부각되고 있습니다.' },
                { id: 17, name: '파크시스템스', baseScore: 86, volatility: 3, strength: '반도체 검사 장비 성장', coreReason: '첨단 반도체 검사 수요 확대 흐름이 지속되고 있습니다.' },
                { id: 18, name: 'ISC', baseScore: 86, volatility: 4, strength: '반도체 소켓 수혜', coreReason: 'AI 반도체 테스트 수요 증가 기대감이 강화되고 있습니다.' },
                { id: 19, name: '주성엔지니어링', baseScore: 85, volatility: 4, strength: '반도체 장비 성장', coreReason: '반도체 설비 투자 확대에 따른 수혜 기대가 이어지고 있습니다.' },
                { id: 20, name: '솔브레인', baseScore: 84, volatility: 2, strength: '반도체 소재 핵심주', coreReason: '반도체 공정 소재 수요 증가와 실적 개선 기대가 반영되고 있습니다.' },
            ]
        };

        const analyzeRealtimeMomentum = (stocks, marketType) => {
            const now = new Date();
            const seed = now.getSeconds() + now.getMilliseconds();

            return stocks.map((stock, i) => {
                const rawVariation = Math.sin(seed + stock.id) * stock.volatility;
                const delta = Math.round(rawVariation * 0.6);
                const score = Math.max(80, Math.min(99, stock.baseScore + delta));

                const volumeChange = (stock.volatility + delta) > 2 ? "폭발적으로 급증" : "점진적으로 증가";
                const strengthDesc = (delta >= 1) ? "장중 매수세가 가파르게 유입되며 상방 압력을 높이고 있습니다." 
                                                 : "차익 실현 매물을 소화하면서 안정적인 추세를 유지하는 과정에 있습니다.";

                const reason = `${stock.coreReason} 현재 시점 실시간 수급을 추적한 결과, 외국인·기관의 동시 순매수 기조 하에 거래대금이 ${volumeChange}하고 있습니다. 장 초반의 급등 이후에도 체결 강도가 강한 지지선을 구축하여 흔들림 없이 탄탄하게 유지되고 있으며, 동일 테마 및 유관 업종 전반으로 활발한 순환매 수급이 지속적으로 전이되면서 단기 모멘텀이 극대화되고 있습니다. 더불어 주요 이동평균선상의 견고한 지지 흐름이 연쇄적으로 유지되고 있어 눌림목 구간을 성공적으로 탈피한 후 상방 재상승 국면에 접어들 가능성이 압도적으로 높습니다. ${strengthDesc}`;

                return {
                    id: stock.id,
                    name: stock.name,
                    score,
                    strength: stock.strength,
                    reason
                };
            });
        };

        function App() {
            const [marketType, setMarketType] = useState('코스피');
            const [isUpdating, setIsUpdating] = useState(false);
            
            // 실시간 분석 데이터 관리 상태 및 날짜 상태 관리
            const [updateDate, setUpdateDate] = useState(() => getFormattedDate(new Date()));
            const [kospiData, setKospiData] = useState(() => analyzeRealtimeMomentum(rawStocksData['코스피'], '코스피'));
            const [kosdaqData, setKosdaqData] = useState(() => analyzeRealtimeMomentum(rawStocksData['코스닥'], '코스닥'));
            const [lastUpdate, setLastUpdate] = useState(new Date().toLocaleTimeString());
            
            const prevRanksRef = useRef({});

            const stocks = useMemo(() => {
                const currentList = marketType === '코스피' ? kospiData : kosdaqData;
                const sorted = [...currentList].sort((a, b) => b.score - a.score);
                
                return sorted.map((stock, index) => {
                    const currentRank = index + 1;
                    const prevRank = prevRanksRef.current[stock.name];
                    
                    let rankChange = 'same';
                    if (prevRank) {
                        if (prevRank > currentRank) rankChange = 'up';
                        else if (prevRank < currentRank) rankChange = 'down';
                    }
                    
                    prevRanksRef.current[stock.name] = currentRank;
                    return { ...stock, currentRank, rankChange };
                });
            }, [marketType, kospiData, kosdaqData]);

            const refreshData = async () => {
                setIsUpdating(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });

                await new Promise(resolve => setTimeout(resolve, 1500));
                
                const now = new Date();
                const newKospi = analyzeRealtimeMomentum(rawStocksData['코스피'], '코스피');
                const newKosdaq = analyzeRealtimeMomentum(rawStocksData['코스닥'], '코스닥');
                
                setKospiData(newKospi);
                setKosdaqData(newKosdaq);
                setUpdateDate(getFormattedDate(now)); // 갱신 시점 날짜 업데이트
                setLastUpdate(now.toLocaleTimeString());
                setIsUpdating(false);
            };

            const getScoreStyle = (score) => {
                if (score >= 93) return 'bg-rose-100 text-rose-600 border border-rose-200';
                if (score >= 89) return 'bg-sky-100 text-sky-600 border border-sky-200';
                return 'bg-emerald-100 text-emerald-600 border border-emerald-200';
            };

            return (
                <div className="min-h-screen bg-[#fcfcfd] text-gray-800 tracking-tight pb-10">
                    <div className="max-w-5xl mx-auto min-h-screen bg-white shadow-sm border-x border-gray-100">
                        {/* 헤더 */}
                        <header className="sticky top-0 z-30 border-b border-gray-100 bg-white/90 backdrop-blur-lg px-4 py-3 sm:px-6 sm:py-4">
                            <div className="flex items-center justify-between gap-2 sm:gap-3">
                                <div className="flex-1 min-w-0">
                                    <div className="text-[9px] font-bold text-gray-400 flex items-center gap-2 tracking-widest uppercase">
                                        <span className="shrink-0 text-indigo-500 font-extrabold">{updateDate}</span>
                                        <span className={`hidden xs:inline-block bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100 ${isUpdating ? 'animate-pulse text-indigo-500' : ''}`}>
                                            {isUpdating ? 'CALCULATING...' : `UPDATED: ${lastUpdate}`}
                                        </span>
                                    </div>
                                    <h1 className="text-lg font-black text-gray-900 sm:text-2xl mt-0.5 truncate">장중 모멘텀</h1>
                                </div>
                                
                                <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                                    {/* 시장 전환 버튼 */}
                                    <div className="relative flex w-[100px] xs:w-[120px] sm:w-[140px] items-center rounded-xl bg-gray-50 p-1 border border-gray-100">
                                        <div className={`absolute top-1 bottom-1 w-[calc(50%-4px)] rounded-lg bg-white shadow-sm transition-all duration-300 ease-out border border-gray-100 ${marketType === '코스피' ? 'translate-x-0' : 'translate-x-[calc(100%+0px)]'}`} />
                                        <button onClick={() => setMarketType('코스피')} className={`relative z-10 flex-1 rounded-lg py-1.5 text-[10px] sm:text-[12px] font-bold transition-colors ${marketType === '코스피' ? 'text-indigo-600' : 'text-gray-400'}`}>코스피</button>
                                        <button onClick={() => setMarketType('코스닥')} className={`relative z-10 flex-1 rounded-lg py-1.5 text-[10px] sm:text-[12px] font-bold transition-colors ${marketType === '코스닥' ? 'text-indigo-600' : 'text-gray-400'}`}>코스닥</button>
                                    </div>

                                    {/* 갱신 버튼 */}
                                    <button 
                                        disabled={isUpdating} 
                                        onClick={refreshData} 
                                        className="inline-flex items-center justify-center whitespace-nowrap rounded-xl bg-indigo-50 px-3 sm:px-4 py-2 text-[11px] sm:text-xs font-bold text-indigo-500 border border-indigo-100 hover:bg-indigo-100 active:scale-95 transition-all disabled:opacity-50"
                                    >
                                        {isUpdating ? (
                                            <span className="flex items-center gap-1.5">
                                                <svg className="animate-spin h-3 w-3 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                                분석 중
                                            </span>
                                        ) : '데이터 갱신'}
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* 로딩 바 */}
                        <div className="h-0.5 w-full bg-gray-50 overflow-hidden relative">
                            {isUpdating && <div className="absolute top-0 left-0 h-full w-1/4 bg-indigo-500 animate-loading"></div>}
                        </div>

                        {/* 신설: 종목 선정 및 실시간 분석 기준 박스 */}
                        <div className="mx-4 my-3 sm:mx-6 sm:my-4 bg-indigo-50/20 border border-indigo-100/50 rounded-2xl p-4 transition-all">
                            <h4 className="text-xs font-bold text-gray-900 flex items-center gap-1.5 mb-2.5">
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"></span>
                                실시간 장중 모멘텀 종목 선정 기준
                            </h4>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 text-[11px] leading-relaxed text-gray-500">
                                <div className="bg-white/60 p-2.5 rounded-xl border border-gray-100">
                                    <span className="font-bold text-gray-800 block mb-0.5">1. 수급 집중도</span>
                                    장중 외국인과 기관의 실시간 동시 순매수 기조 및 대형 체결 물량이 꾸준히 인입되는 종목을 우선합니다.
                                </div>
                                <div className="bg-white/60 p-2.5 rounded-xl border border-gray-100">
                                    <span className="font-bold text-gray-800 block mb-0.5">2. 거래대금 스파이크</span>
                                    최근 5분에서 15분 간의 누적 거래대금이 당일 평균 체결 수준 대비 200% 이상 폭발적으로 급증한 대장주를 선별합니다.
                                </div>
                                <div className="bg-white/60 p-2.5 rounded-xl border border-gray-100">
                                    <span className="font-bold text-gray-800 block mb-0.5">3. 주도 테마 부합성</span>
                                    AI 반도체, 전력인프라, 차세대 바이오 등 시장 자금이 가장 조밀하게 몰리는 당일 핵심 주도 테마군에 해당해야 합니다.
                                </div>
                                <div className="bg-white/60 p-2.5 rounded-xl border border-gray-100">
                                    <span className="font-bold text-gray-800 block mb-0.5">4. 기술적 지지세</span>
                                    20일 이동평균선의 견조한 지지를 확보하고, 장중 상승 후 건강한 단기 눌림목 구간을 성공적으로 탈피하는 흐름을 포착합니다.
                                </div>
                            </div>
                        </div>

                        <div className={`transition-all duration-700 ${isUpdating ? 'opacity-40 scale-[0.99] grayscale-[0.5]' : 'opacity-100 scale-100 grayscale-0'}`}>
                            {/* 데스크톱 */}
                            <div className="hidden md:block">
                                <table className="w-full text-left border-collapse table-fixed">
                                    <thead className="bg-gray-50/50 text-[11px] font-bold text-gray-400 uppercase tracking-[0.1em]">
                                        <tr>
                                            <th className="w-[220px] px-6 py-4 border-b border-gray-100">Rank / Name</th>
                                            <th className="w-[100px] px-6 py-4 text-center border-b border-gray-100">Score</th>
                                            <th className="px-6 py-4 border-b border-gray-100">AI Momentum Analysis (Continuous)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stocks.map((stock) => (
                                            <tr key={stock.name} className="group border-b border-gray-50 transition-colors hover:bg-gray-50/30">
                                                <td className="px-6 py-5">
                                                    <div className="flex items-center gap-4">
                                                        <div className="flex min-w-[40px] items-baseline gap-1">
                                                            <span className="text-xl font-black text-gray-300 group-hover:text-indigo-400 italic transition-colors">{stock.currentRank}</span>
                                                            {stock.rankChange === 'up' && <span className="text-[10px] font-bold text-rose-500 animate-bounce">▲</span>}
                                                            {stock.rankChange === 'down' && <span className="text-[10px] font-bold text-sky-500">▼</span>}
                                                        </div>
                                                        <div className="truncate">
                                                            <div className="text-[15px] font-bold text-gray-800 leading-none truncate">{stock.name}</div>
                                                            <div className="mt-1.5 text-[11px] font-semibold text-indigo-400/80 uppercase tracking-tighter truncate">{stock.strength}</div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-5 text-center">
                                                    <div className={`inline-flex items-center justify-center rounded-lg px-2.5 py-1 text-xs font-black shadow-sm ${getScoreStyle(stock.score)}`}>{stock.score}</div>
                                                </td>
                                                <td className="px-6 py-5">
                                                    <div className="text-[12px] text-gray-500 font-medium leading-relaxed break-keep">
                                                        {stock.reason}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* 모바일 - 가시성이 고도화된 한 줄 텍스트 자동 흐름 구조 */}
                            <div className="md:hidden divide-y divide-gray-50 px-2 pt-2">
                                {stocks.map((stock) => (
                                    <div key={stock.name} className="bg-white mx-1 my-2 rounded-2xl border border-gray-50 p-4 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] transition-all active:scale-[0.98]">
                                        <div className="flex items-center justify-between mb-3">
                                            <div className="flex items-center gap-3 overflow-hidden flex-1">
                                                <div className="flex flex-col items-center justify-center bg-gray-50 rounded-lg w-10 h-10 shrink-0">
                                                    <span className="text-lg font-black text-indigo-400 italic leading-none">{stock.currentRank}</span>
                                                    <div className="flex gap-0.5 mt-0.5">
                                                        {stock.rankChange === 'up' && <span className="text-[8px] font-bold text-rose-500 animate-bounce">▲</span>}
                                                        {stock.rankChange === 'down' && <span className="text-[8px] font-bold text-sky-500">▼</span>}
                                                    </div>
                                                </div>
                                                <div className="truncate">
                                                    <h3 className="text-[18px] font-black text-gray-900 leading-tight tracking-tight truncate">{stock.name}</h3>
                                                    <div className={`inline-block mt-0.5 px-1.5 py-0.5 rounded text-[10px] font-black ${getScoreStyle(stock.score)}`}>
                                                        {stock.score}점
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-right shrink-0 ml-2">
                                                <p className="text-[11px] font-bold text-indigo-400 leading-tight bg-indigo-50 px-2 py-1 rounded-md max-w-[120px] truncate">
                                                    {stock.strength.split(' + ')[0]}
                                                </p>
                                            </div>
                                        </div>
                                        
                                        {/* 모바일용 시각 최적화 텍스트 영역 */}
                                        <div className="rounded-xl border border-gray-100 bg-gray-50/30 p-3.5">
                                            <div className="text-[13px] text-gray-600 font-medium leading-[1.6] tracking-tight break-keep whitespace-normal">
                                                {stock.reason}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <footer className="p-10 text-center bg-white border-t border-gray-50 mt-4">
                            <p className="text-[10px] font-bold text-gray-300 uppercase tracking-[0.2em] mb-3">{VERSION} MOMENTUM SCREENER</p>
                            <p className="text-[11px] text-gray-400 leading-relaxed font-medium px-4">
                                본 정보는 AI 분석에 의한 참고용 자료이며 투자 결과에 대한 책임은 본인에게 있습니다.<br/>
                                실시간 수급 및 거래량 데이터는 1분 간격으로 업데이트됩니다.
                            </p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
