    // ==========================================
    // Gemini API 구조 설정 및 스키마 선언

    const indexSchema = {
      type: "OBJECT",
      properties: {
        kospi: {
          type: "OBJECT",
          properties: {
            index: { type: "STRING", description: "코스피 현재 지수값 (예: 2654.21)" },
            change: { type: "STRING", description: "코스피 전일대비 등락률 (예: +1.20% 또는 -0.45%)" }

              flow: { type: "STRING", description: "간결한 수급 동향 설명" }
            },
            required: ["name", "strength", "flow"]
          }
        }
      },
      required: ["kospi", "kosdaq", "sectors"]
    };

    const stocksSchema = {
      type: "ARRAY",
      items: {
        type: "OBJECT",
        properties: {
          name: { type: "STRING", description: "종목명" },
          price: { type: "NUMBER", description: "현재 실시간 주가 (원 단위 숫자)" },
          rate: { type: "NUMBER", description: "오늘 등락률 (숫자만, 예: 2.35 또는 -1.40)" },
          volume: { type: "NUMBER", description: "오늘 거래량" },
          prevVolume: { type: "NUMBER", description: "전일 거래량" }
        },
        required: ["name", "price", "rate", "volume", "prevVolume"]
      }
    };

    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    const callGeminiAPI = async (prompt, systemInstruction, schema) => {
      const apiKey = "";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        tools: [{ google_search: {} }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: schema
        }
      };

      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          
          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            return JSON.parse(text);
          }
          throw new Error("No payload found in candidates");
        } catch (err) {
          if (attempt === 4) {
            throw new Error("네트워크 장애가 있습니다.");
          }
          await delay(Math.pow(2, attempt) * 1000);
        }
      }
    };

    const fetchIndexViaGemini = async () => {
      const today = new Date().toLocaleDateString('ko-KR');
      const systemPrompt = "당신은 한국 주식 시장의 실시간 지수 정보를 분석하는 전문 연구원입니다. 주관적 설명 없이 지정된 스키마 JSON 규격을 엄수해야 합니다.";
      const prompt = `오늘(${today}, 2026년 5월 28일) KOSPI와 KOSDAQ의 가장 최신 실시간 지수값, 등락률, 그리고 4대 주도 섹터를 수집하세요.`;
      return await callGeminiAPI(prompt, systemPrompt, indexSchema);
    };

    const fetchStocksViaGemini = async (stocks, market) => {
      const names = stocks.map(s => s.name).join(', ');
      const today = new Date().toLocaleDateString('ko-KR');
      const systemPrompt = "당신은 특정 상장 종목의 거래량 및 실시간 주가를 추적하는 금융 파서입니다. 스키마 규격을 가공하여 리턴하십시오.";
      const prompt = `오늘(${today}, 2026년 5월 28일) 한국 ${market} 시장의 다음 종목들의 현재 실시간 주가(원 단위), 당일 등락률(%), 거래량, 그리고 직전일 거래량을 수집하십시오:\n${names}`;
      return await callGeminiAPI(prompt, systemPrompt, stocksSchema);
    };

    const generateMockLiveState = (baseStocks) => {
      return baseStocks.map(stock => {
        const randomShift = (Math.random() * 6 - 3); 
        const finalRate = parseFloat((stock.baseRate + randomShift).toFixed(2));
        const randomVolScale = parseFloat((80 + Math.random() * 100).toFixed(1));
        const mockPrice = Math.round(stock.basePrice * (1 + finalRate / 100));
        return {
          name: stock.name,
          price: Math.round(mockPrice / 100) * 100,
          rate: finalRate,
          volume: Math.round(150000 * (randomVolScale / 100)),
          prevVolume: 150000
        };
      });
    };

    const generateMockIndexState = () => {
      const kospiMove = (Math.random() * 1.4 - 0.7);
      const kosdaqMove = (Math.random() * 1.8 - 0.9);
      const kpVal = (2660 + Math.random() * 50);
      const kdVal = (860 + Math.random() * 30);
      return {
        kospi: { index: kpVal.toLocaleString(undefined, {minimumFractionDigits: 2}), change: `${kospiMove >= 0 ? '+' : ''}${kospiMove.toFixed(2)}%` },
        kosdaq: { index: kdVal.toLocaleString(undefined, {minimumFractionDigits: 2}), change: `${kosdaqMove >= 0 ? '+' : ''}${kosdaqMove.toFixed(2)}%` },
        sectors: defaultMarketStatus.sectors.map(s => ({
          ...s,
          strength: (parseFloat(s.strength) + (Math.random() * 2 - 1)).toFixed(1)
        }))
      };
    };

    const mergeStockData = (base, live) => {
      const liveMap = {};
      if (Array.isArray(live)) {
        live.forEach(l => { 
          if (l && l.name) liveMap[l.name] = l; 
        });
      }

      return base.map(stock => {
        const l = liveMap[stock.name];
        let rate = stock.baseRate;
        let volRate = stock.baseVolRate;
        let price = stock.basePrice;
        let isLive = false;

        if (l) {
          isLive = true;
          if (l.rate !== null && l.rate !== undefined) {
            rate = parseFloat(l.rate.toFixed(2));
          }
          if (l.price !== null && l.price !== undefined) {
            price = typeof l.price === 'string' ? parseFloat(l.price.replace(/,/g, '')) : l.price;
          }
          if (l.volume && l.prevVolume && l.prevVolume > 0) {
            volRate = parseFloat(((l.volume / l.prevVolume) * 100).toFixed(1));
          }
        }

        const rateBonus = rate > 0 ? Math.min(4, Math.floor(rate * 0.5)) : Math.max(-5, Math.floor(rate * 0.7));
        const score = Math.max(80, Math.min(99, stock.baseScore + rateBonus));

        const isUnder = rate < 0;
        const reason = isUnder
          ? `${stock.coreReason} 최근 주가 흐름 분석 결과 단기 수급 불균형으로 인한 조정세(${rate}%)를 기록 중이며, 현재가는 ${price ? price.toLocaleString() : '—'}원입니다. 주요 지지 가격대를 재탐색하고 있습니다.`
          : `${stock.coreReason} 최근 주가 흐름 분석 결과 견조한 모멘텀 탄력(+${rate}%)을 유지하고 있으며, 현재가는 ${price ? price.toLocaleString() : '—'}원입니다. 원활한 대량 매수세 유입과 지배력이 지속되고 있습니다.`;

        return { ...stock, price, rate, volRate, score, reason, isLive };
      });
    };

    function App() {
      const [marketType, setMarketType] = useState('코스피');
      const [isUpdating, setIsUpdating] = useState(false);
      const [updateDate, setUpdateDate] = useState(() => getFormattedDate(new Date()));
      const [marketStatus, setMarketStatus] = useState(defaultMarketStatus);
      const [kospiData, setKospiData] = useState([]);
      const [kosdaqData, setKosdaqData] = useState([]);
      const [statusMsg, setStatusMsg] = useState('');
      
      const [selectedStock, setSelectedStock] = useState(null);
      const [notification, setNotification] = useState(null);

      const prevRanksRef = useRef({});
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);
      const kospiScrollPos = useRef(0);
      const kosdaqScrollPos = useRef(0);
      const isSwitchingRef = useRef(false);

      useEffect(() => { 
        refreshData(); 
      }, []);

      useEffect(() => {
        const onScroll = () => {
          if (isSwitchingRef.current) return;
          if (marketType === '코스피') kospiScrollPos.current = window.scrollY;
          else kosdaqScrollPos.current = window.scrollY;
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, [marketType]);

      const changeMarket = (t) => {
        if (marketType === t) return;
        isSwitchingRef.current = true;
        setMarketType(t);
        setTimeout(() => {
          window.scrollTo({ top: t === '코스피' ? kospiScrollPos.current : kosdaqScrollPos.current, behavior: 'auto' });
          setTimeout(() => { isSwitchingRef.current = false; }, 50);
        }, 0);
      };

      const refreshData = async () => {
        setIsUpdating(true);
        setKospiData([]); 
        setKosdaqData([]);
        const now = new Date();

        try {
          setStatusMsg('지수 정보를 로딩 중입니다...');
          let indexData = defaultMarketStatus;
          try {
            const fetchedIndex = await fetchIndexViaGemini();
            if (fetchedIndex && fetchedIndex.kospi) {
              indexData = fetchedIndex;
            }
          } catch (e) {}
          setMarketStatus(indexData);

          setStatusMsg('코스피 시세 정보를 로딩 중입니다...');
          let kospiLive = [];
          try {
            kospiLive = await fetchStocksViaGemini(initialStocksData['코스피'], '코스피');
          } catch (e) {}
          const mergedKospi = mergeStockData(initialStocksData['코스피'], kospiLive);
          setKospiData(mergedKospi);

          setStatusMsg('코스닥 시세 정보를 로딩 중입니다...');
          let kosdaqLive = [];
          try {
            kosdaqLive = await fetchStocksViaGemini(initialStocksData['코스닥'], '코스닥');
          } catch (e) {}
          const mergedKosdaq = mergeStockData(initialStocksData['코스닥'], kosdaqLive);
          setKosdaqData(mergedKosdaq);

          showNotification('실시간 데이터 갱신이 완료되었습니다.');

        } catch (e) {
          const simIndex = generateMockIndexState();
          setMarketStatus(simIndex);
          const kLive = generateMockLiveState(initialStocksData['코스피']);
          setKospiData(mergeStockData(initialStocksData['코스피'], kLive));
          const qLive = generateMockLiveState(initialStocksData['코스닥']);
          setKosdaqData(mergeStockData(initialStocksData['코스닥'], qLive));
        }

        setUpdateDate(getFormattedDate(now));
        setStatusMsg('');
        setIsUpdating(false);
        kospiScrollPos.current = 0;
        kosdaqScrollPos.current = 0;
      };

      const showNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => {
          setNotification(null);

      };

        const list = marketType === '코스피' ? kospiData : kosdaqData;
        const sorted = [...list].sort((a, b) => b.score - a.score);
        return sorted.map((stock, i) => {
          const rank = i + 1;
          const prev = prevRanksRef.current[stock.name];
          let rankChange = 'same';
          if (prev) rankChange = prev > rank ? 'up' : prev < rank ? 'down' : 'same';
          prevRanksRef.current[stock.name] = rank;
          return { ...stock, currentRank: rank, rankChange };
        });
      }, [marketType, kospiData, kosdaqData]);

      const getScoreStyle = (s) => {
        if (s >= 93) return 'bg-rose-50 text-rose-600 border border-rose-200/60 shadow-sm shadow-rose-100';
        if (s >= 89) return 'bg-sky-50 text-sky-600 border border-sky-200/60 shadow-sm shadow-sky-100';

        btn: 'bg-indigo-50 text-indigo-600 border-indigo-100 hover:bg-indigo-100/60',

        btn: 'bg-emerald-50 text-emerald-600 border-emerald-100 hover:bg-emerald-100/60',

                  <div className="flex items-baseline gap-2 mt-1">

              onTouchEnd={e => {
                touchEndX.current = e.changedTouches[0].clientX;
                const d = touchEndX.current - touchStartX.current;
                if (Math.abs(d) > 80) changeMarket(d > 0 ? '코스피' : '코스닥');
              }}
              className="transition-all duration-700 min-h-[500px]"
            >
              {stocks.length === 0 ? (
                <div className="p-24 text-center flex flex-col items-center justify-center gap-4">
                  <div className={`w-9 h-9 rounded-full border-4 border-slate-100 border-t-current animate-spin ${tc.spin}`} />
                  <p className="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest animate-pulse">정보를 가져오는 중입니다...</p>
                </div>
              ) : (
                <>
                  {/* PC 테이블 */}
                  <div className="hidden md:block overflow-hidden">
                    <table className="w-full text-left border-collapse table-fixed">
                      <thead className="bg-slate-50/50 text-[11px] font-bold text-slate-400 uppercase tracking-[0.1em]">
                        <tr>
                          <th className="w-[240px] px-6 py-4 border-b border-slate-100/60">순위 / 종목명 · 현재가</th>
                          <th className="w-[140px] px-4 py-4 text-center border-b border-slate-100/60">거래량 전일대비</th>

                        </tr>
                      </thead>
                      <tbody>
                        {stocks.map(stock => (
                          <tr

                                  {stock.rankChange === 'up' && <span className="text-[10px] font-extrabold text-rose-500 animate-bounce">▲</span>}

                            </td>
                            <td className="px-4 py-4.5 text-center">
                              <span className={`inline-block text-[11px] font-bold border px-2 py-0.5 rounded-md whitespace-nowrap ${tc.tag}`}>

                            <td className="px-4 py-4.5 text-center">

                            <td className="px-6 py-4.5">

                                {stock.reason}
                              </div>
                            </td>
                          </tr>

                      </tbody>

                  </div>

                  {/* 모바일 세로 카드 */}
                  <div className="md:hidden divide-y divide-slate-100/50 px-2 pt-2">

                                <span className={`text-[10px] font-black px-1.5 py-0.5 rounded whitespace-nowrap ${stock.rate >= 0 ? 'text-rose-600 bg-rose-50 border border-rose-100' : 'text-sky-600 bg-sky-50 border border-sky-100'}`}>

                    {/* 마인드맵 분석 단락 */}
                    <div className="space-y-1.5">
                      <span className="font-bold text-slate-400 text-xs uppercase tracking-wide block">상세 리포트 분석</span>
                      <div className="bg-slate-50/60 rounded-2xl p-4 border border-slate-100/50 text-xs md:text-[13px] leading-relaxed text-slate-700 font-medium break-keep">
                        {selectedStock.reason}
                      </div>
                    </div>

                  </div>

                  {/* 모달 푸터 */}
                  <div className="p-4 bg-slate-50/40 border-t border-slate-100 flex justify-end gap-2">
                    <button
                      onClick={() => setSelectedStock(null)}
                      className="px-5 py-2 text-xs font-black text-slate-700 bg-slate-100 hover:bg-slate-200/50 rounded-xl transition-all"
                    >
                      닫기
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
